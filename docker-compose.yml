services:
  backend:
    build: ./backend
    environment:
      CSTCLOUD_API_KEY: ${CSTCLOUD_API_KEY:-}
      CSTCLOUD_BASE_URL: https://uni-api.cstcloud.cn/v1
      DATABASE_URL: sqlite:////app/data/cstcloud_rag.db
      CHROMA_PATH: /app/data/chroma
      UPLOAD_PATH: /app/data/uploads
      CORS_ORIGINS: http://localhost:5173,http://localhost:8080
    volumes:
      - rag_data:/app/data
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 3s
      retries: 5

  frontend:
    build: ./frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:80"

volumes:
  rag_data:
